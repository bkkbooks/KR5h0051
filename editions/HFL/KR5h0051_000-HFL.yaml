front:
  text: 法師選擇記貞觀元年正月十五日唐太宗皇帝宣問諸大臣僚朕見天下萬姓母三四日長明設齋求福如何却有禍生當時三蔵和尚奏萬姓設齋之日值遇㐫神故為咎者皆是不按蔵經内值言神可用之日所以致此臣今蔵經内録如來選擇記奏上見其禍福由之日吉㐫也甲子日是善財童子在世齋迷願者子孫昌盛福生招財大吉利乙丑丙寅日是阿羅漢尊長者與天神下䧏有人設齋還願者萬倍衣禄財宝自然吉慶大吉利丁卯日是司命檢齋有人祈禱還願者迈善爲𢙣妨人口大㐫可忌戊辰巳巳日是那吒太子檢齋若人設醮還福善為恩妨人口大㐫庚午日是青衣童子在世檢齋還福者主萬倍富貴興大吉辛未日是三途餓鬼在世檢齋還願者主三年破財損六畜大訩壬申癸酉日是判宫在世檢齋還願者主一年内有禍大㐫甲戌乙亥丙子丁丑戊寅巳卯六日是馬鳴王菩薩即得無量福曰萬事大吉利庚辰辛巳壬午日是浄神𢙣鬼在世設齋主傷人口生灾家中常有血光火燭一年大㐫癸未日是野婦羅刹設齋主一年内人口破散㐫甲申乙酉丙戍三日是弥陀佛說法之日設齋還願主三年內獲福萬倍子孫興旺龍神獲佑百事吉丁亥日是朱雀神在世設齋還順者官灾口舌病侵害大㐫戊子日是𡨋司差極忌神在世設齋還願者主一年遇遭官事口舌是非疾病此曰大㐫巳丑日是司命真君差童子在世檢齋還願者人口安康獲福無量此日平安庚寅辛卯日是畜神在世設齋還願者主一年内破財損畜是非大㐫壬辰日是阿難尊者與青衣童子在世設齋還願者主子孫昌盛獲福無量三年大吉利癸巳日是悪神逰行設齋還願者主年年大不利甲午乙未丙申丁酉戊戌巳亥庚子辛丑八日是文殊普賢與青衣童子在世檢齋還願者此曰獲福無量百事大吉壬寅癸卯日是觀音菩薩行化之曰設齋還願者主見孫得獼後世生净土所生男女十相俱𠯣大吉利也四辰乙巳日星天下四角大神在世檢齋還願者迈善為𢙣人眷生灾大㐫丙午丁未日是牛頭夜义在世檢齋還願者人不信用者三年内傷人口此日大㐫戊申巳酉日是千佛下世設齋酬恩者主福利萬倍子孫昌盛財物典旺六畜孳生大吉利
