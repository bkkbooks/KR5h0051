body:
  text: 日是一切賢聖同降逰行天下設齋祈福者獲福無量大吉壬子癸丑甲寅乙卯四日是諸佛賢聖同𢙣樹設齋者此日平丙辰丁巳日是大頭金剛在世設齋者此日大㐫戊午日星諸聖不受心不明此日大㐫巳末日是釋迦如来同菩薩在世設齋酬恩者福利無量大吉庚申辛酉日是釋迦如来說法之曰設齋酬恩者獼利無量家宅富貴興旺子孫昌盛主大吉利壬戍癸亥日是諸佛不檢齋之日大㐫盖聞皇極玉記秘扵大有之庭岀自太虛玉匣之内自意君許始有立烏選擇記者蔵扵西土寳塔之上自三蔵貞觀初現此分二教建善之文所由起也雖同源而異泒百川之流歸扵海天下無二道聖人無两心既有其文不可不遵烏争命梓匠刋施用廣流傳上報君恩下保黎庶開示有情同霑福慶弘治元年戌申仲秋旦玄玄道人延陵子後序合帳吉日甲子庚午丙子壬午戊子丙戌乙未癸夘試新衣日戊辰癸酉巳卯庚辰丙戌丁亥巳丑癸已甲午戊申庚戌乙卯太子洗頭吉㐫之日初一短命初二吉事初三富貴初四脫色初五落髮初六損容初七招官初八長命初九宜婚初十加官十一眼明十二多厄十三宜男十四招財十五王喜十六大㐫十七面黑十八招盗十九不吉二十主貧二十一多病二十二吉慶二十三大吉二十四口舌二十五損目二十六大利二十七如常二十八争闘二十九㐫兆三十招鬼文殊裁衣吉㐫日期角安穩亢得食氐覩友房益衣心盗賊尾必壊箕王疾斗羙味牛進喜女得病虛得粮危遭毒室水厄壁獲寳奎益財娄增壽胃减服昴火焼畢多事䑕咬參逢盗井相分鬼吉祥柳㐫服星䘮服張逢歡翼得財軫長乆看男女值年星辰命之屬十一歲男子土星女人火星十二嵗男子水星女人木星十三歲男子金星女人太隂星十四歳男子太陽星女人土星十五嵗男子火星女人羅睺星十六歳男子計都星女人太陽星十七歲男子太隂星女人金星十八歲男子木星女人水星十九歲男子羅睺星女人計都星二十歲男子土星女人火星二十一歲男子水星女人木星二十二歲男子金星女人太陽星二十三歲男子太陽星女人土星二十四嵗男子火星女人羅睺星二十五歲男子計都星女人太陽星二十六嵗男子太隂星女人金星二十七歳男子木星女人水星二十八歲男子羅睺星女人計都星二十九歲男子土星女人火星三十歲男子水星女人木星三十一歲男子金星女人太陽星三十二歲男子太陽星女人土星三十三歲男子火星女人羅睺星三十四歳男子計都星女人太陽星三十五歲男子太隂星女人金星三十六歲男子木星女人水星二十七歲男子羅睺星女人計都星三十八歲男子土星女人火星二十九歲男子水星女人水星四十嵗男子金星女人太隂星四十一歲男子太陽星女人土星四十二歲男子火星女人羅睺星四十三歲男女計都星女人太陽星四十四歲男子太隂星女人金星四十五歲男子水星女人水星四十六歲男子羅睺星女人計都星四十七歲男子土星女人火星四十八歲男子水星女人水星四十九歲男子金星女人太隂星五十嵗男子太陽星女人土星五十一歲男子火星女人羅睺星五十二歲男子計都星女人太陽星五十三歲男子太隂星女人金星五十四歲男子木星女人水星五十五歲男子羅睺星女人計都星臘呻六歲男子土星女人火星五十七歲男子水星女人木星五十八歲男子金星女人太隂星五十九歲男子太陽星女人土星六十歲男子火星女人羅睺星六十一歲男子計都星女人太隂星六十二歲男子太隂星女人金星六十三歲男子木星女人水星六十四歲男子羅㬋星女人計都星六十五歲男子土星女人火星六十六歲男子水星女人木星六十七歲男子金星女人太隂星六十八歲男子太陽星女人土星六十九歲男子火星女人羅睺星七十歲男子計都星女人太陽星七十一歲男子太隂星女人金星七十二歲男子水星女人水星七十三歲男子羅睺星女人計都星七十四歲男子土星女人火星七十五歲男子水星女人水星七十六歲男子金星女人太隂星七十七歳男子太陽星女人土星七十八歲男子火星女人羅睺星七十九歲男子計都星女人太陽星八十歲男子太隂星女人金星八十一歲男子水星女人水星八十二歲男子羅㬋星女人計都星八十三歲男子土星女人火星八十四歲男子水星女人木星八十五歲男子金星女人太隂星八十六歲男子太陽星女人土星八十七歲男子火星女人羅睺星八十八歲男子計都星女人太陽星八十九歲男子太隂星女人金星九十歲男子木星女人水星九十一歲男子羅睺星女人計都星九十二歲男子土星女人火星九十三歲男子水星女人木星九十四歲男子金星女人太隂星九十五歲男子太陽星女人土星九十六歲男子火星女人羅睺星九十七歲男子計都星女人太陽星九十八歲男子太隂星女人金星九十九歲男子木星女人水星羅睺星行年值羅睺主人作事憂男子宫灾至女人也閑愁名曰口舌屋主見官灾口舌眼目之疾女人有血光産鬼用神在曰正祭之子每月初八日下界用燈九盞工星行年值土星官事来相侵出入多不順隄防小人驚此年見灾不安六畜不利家宅啾唧夜多恠夣不逺行每月十九日下界用燈五盏正西祭之大吉水星行年值水星隂人多喧閙男子為福禄女人口舌侵各曰福禄星大人見喜逺人有財添人進口無灾難不渡河每月二十一日下界用燈七盏正西祭之大吉金星行年值金星事不遂心男子憂庻幾大忌是女人名曰朝元星貴人見喜添人進口婚姻嫁娶出入小人隄防肚腹之疾小人不足每月十五日下界用燈八盞正西祭之大吉太陽星行年值太陽終歲得安男子重重喜凡事宜和順各曰太星星輝光天下無不明朗主人逺行有財大人見喜添人進口萬事和合每月二十七日下界用燈十二盞正西祭之六吉火星行年值火星守舊且潜身女人定灾難男命不離刑名曰灾星主瘡疾女人産難血光男子官灾不利之年六畜不旺人口不安每月二十九日下界用燈十五盞正西祭之大吉計都星行年計都星灾害不時侵陽命還猶可大忌是隂人名曰主人有㐫是非大人不喜六畜不利宜出入逺行有財在家有暗昧之事每月十八日下界用燈二十盞正西祭之大吉太隂星行年值太隂諸事勝其常求名並求利又宜岀逺方名曰註陽人宜合見官有理隂人有疾危之患産難之厄男子出入凡事遂心每月二十六日下界用燈七盞正西祭之大吉木星行年值木星不利是隂人雖見㣲小疾未為歲月迍名曰朝元星其年眼目之疾隂人見血光之灾婚姻和登人口平安每月二十五日下界用燈二十盞正西祭之大吉正四七十四孟之月甲子妖星乙丑或星丙寅禾刀丁卯煞貢戊辰直星巳巳卜木庚午角巳辛未人專壬申立早發酉妖星甲戍或星乙亥禾刀丙子煞貢丁丑直星戊寅卜木巳卯角已庚辰人専辛巳立時壬午妖星癸未或星甲申禾刀乙酉煞貢丙戍直星丁亥卜木戊子角巳巳丑人專庚寅立早辛卯妖星壬辰或星癸巳禾刀甲午煞貢乙未直星丙申卜木丁酉角已戊戍人專巳亥立早庚子妖星辛丑或星壬寅禾刀癸卯煞貢甲辰直星乙巳卜木丙午角巳丁未人專戊申立早巳酉妖星庚戍或星辛亥禾刀壬子煞貢癸丑直星甲寅卜木乙卯角巳丙辰人專丁巳立早戊午妖星巳未或星庚申禾刀辛酉煞貢壬戌直星癸亥卜未二五八十一月四神之月甲子或星乙丑禾刀丙寅煞貢丁卯直星戊辰卜禾巳巳角巳庚午人專辛未立早壬申妖星癸酉或星甲戌禾刀乙亥煞貢丙子直星丁丑卜木戊寅角巳巳卯人專庚辰立早辛巳妖星壬午或星癸未禾刀甲申煞貢乙酉直星丙戍卜本丁亥角巳戊子人專已丑立早庚寅妖星辛卯或星壬辰禾刀癸已煞貢甲午直星乙未卜木丙申角巳丁酉人專戊戍立早已亥妖星庚子或星辛丑禾刀壬寅煞貢癸卯直星甲辰卜木乙已角巳丙午人專丁未立早戊申妖星巳酉或星庚戌禾刀辛亥煞貢壬子直星癸丑卜木甲寅角巳乙卯人尃丙辰立早丁已妖星戊午或星已未禾刀庚申煞黃辛酉直星壬戍卜木癸亥角巳三六九十二四季之月甲子氶刀乙丑煞貢丙寅直星丁卯卜木戊辰角已巳已人專庚午立早辛未妖星壬申戌星癸酉禾刀甲戌煞貢乙亥直星丙子卜木丁丑角巳戊寅人專已卯立早庚辰妖星辛已或星壬午禾刀癸未煞眞甲申直星乙酉卜木丙戌角巳丁亥人專戊子立早巳丑妖星庚寅或星辛卯禾刀壬辰煞貢癸已直星甲午卜木乙未角已丙申人專丁酉立早戊戍妖星已亥或星庚子禾刀辛丑煞貢壬寅直星癸卯卜木甲辰角巳乙已人專丙午立早丁未妖星戊申或星已酉禾刀庚戌繁貢辛亥直星壬子卜木癸丑角巳甲寅人專乙卯主早丙辰妖星丁已或星戊午禾刀巳未煞貢庚申直星辛酉卜木壬戍角巳癸亥人專妖星如作此星者名曰玄政符入宅右人起造嫁娶移徒祭祀不論大小動用入宅開張等事不出一年内人口灾㐫遭官失賊牢獄刑禁主人口落水四百日後主人口有腹痛疾死田宅退散盖𢙣星来害主百衰敗定主服動損長男大㐫主當日衍木等落水或有口舌自東方南方而來或星如作此星者各曰朱雀入宅當主火盗大㐫一年内主彼人脫漏欺騙等事凡嫁娶移徒上官開張修造等事一年之内主伯衰敗大畜傷死生子不肖主婦人滛亂因事不破壞先生隂人六十日痢疾立見䘮服大訩若當日見口舌隂人小口災㐫向後有災此日只利安墳若有他故皆不可用禾刀如作此星者名白虎入宅不出一年內損不明之人凡人上官赴任造作起盖嫁娶移徒葬埋開張等事不出一年內主人疾病孝服主虎傷殺人口刀丘之事盖被㐫星相犯主百事災㐫若積隂德之人家須見血光必主奴僕當災煞貢如作此星者名曰青龍天德符入宅凡人家起盖嫁娶開張移徒上官赴任造作等事不出三年內有官者樣位高遷無官者田宅增盈富貴興旺主生貴子至三年後大發財榖父慈子孝奴僕成行所爲多慶凡遇吉曜照臨不均大小造作無避僧道用皆吉直星如作此星者名曰金櫃符入宅值此星者凡于造作上官赴任嫁娶開張修造隂宅不出三年內有太吉慶有官者高遷無官者百事稱心牛馬生旺百口食或七十二人富貴榮華主當年招橫財若遇金神七煞㐫年內三七日見五日內主失脱遭官事僧道用俱吉卜木如作此星者名曰道符入宅值此星不出一年內出風聲之人㐫人多刑禍若造作嫁娶葬埋移徒開張僧道入院添修等事不出二年內主有大驚哀哭水火官災之厄子孫相尅兄弟不和盗賊驚恐虛耗女畜不長百事衰敗七年大㐫如遇家長有福德者雖財不祥尚可拜投賢聖祈力保扶角巳此星者名曰太隂入宅如值此星者不吉凡遇嫁娶移徒上官改換門户葬埋等事不出三年主有患病腹痛之疾枷杖蛇傷之厄盗賊水火物業退散如家長有福徳相扶只見口舌死有㐫星惡事人專此星名曰六隂金堂符八宅如值此星者不出一年主生貴子凡造作嫁娶葬埋開張移徒上官入宅移門添修屋宇主三年內有官者禄位重加無官者所爲吉祥大發財榖得外人力善事交集僧道用之吉利也立早此星名曰勾陳符入宅如值此星者造作嫁娶葬埋開張上官赴任修造等事奏將不吉一年内人口退散百事不利家宅破亡如開木堆立木上梁定般航事主人匠刀斧血光之厄如有隂人相扶有口舌作閙諸事不利金符經者聖人秘要與諸家書不同又曰救苦經亦曰宅寶經靈經異書莫傳下愚諸葛先生萬年出行圗昔南陽卧龍諸葛先生選㨂萬年出行圗一本傳流于後揀時開渠放水豎柱上梁迎婚娶嫁納財問名安磑磨脩造安𦵏選揀吉日吉祥善𢙣避之遇㐫時一吉無應不宜用只宜廻避選得吉時不選一百二十步㐫煞用之大吉今定上中下三輪周而復始循環不巳將定到倒月分日数選揀用之吉㐫自見上一九將軍所管吉㐫之圗正月四月七月十月四孟之圗順陽日出行去處通逹争訟有理不逢賊盗求財称意好人相逢出遇酒食此日出行大吉堂房日出行者神道不在宅中求財称意好人相逢此日用之大吉金庫日出行者車馬不成大有失愼路逢賊盗求財不得此日大㐫金堂日岀行者吉利通逹訟有理求財稱意此日用之大吉賊盗日岀行者不利所求未遂必主人亡枷鎻臨身只宜廻避此日百事不宜用寶倉日出行者大人見喜百事通逹求財稱意衣錦還鄉此日可用百事大吉中元將軍所管吉㐫之圖二月五月八月十一月四仲之圗天盗日出行者求財不成口舌臨身此日大㐫不可用天門日岀行者凡事稱心諸事和合去處通逹用之大吉利天堂日岀行者所求皆遂萬事稱意買賣亨通貴入接引此日大吉天財日岀行求財得財好人相逢凡事用之大吉天賊日出行者求財失落見宫無理凡事不成此日用大㐫天陽日出行者所求得財婚姻和合萬事稱心此日大吉利天候日出行者吉少㐫多主口舌見血光之灾此日不宜用天倉日出行所求得財出官見喜此日用之大吉下元將軍所管吉㐫之圖三月六月九月十二月四季之圗朱雀日出行多主失財求財不得見官無理此日大㐫白虎頭日出行者只宜逺行求財稱意去處通逹此日太吉白虎脇日出行者求財遂心東西任意南北安然此日用之吉白虎足日出行者求財不利不宜逺行作事不成此日不宜用玄武日出行者主有口舌凡事不通不可用之㐫青龍頭日出行者求財得利凡出行之日雞嗚卯時大吉青龍脇日出行者求財遂心凡事稱意此曰用之大吉青龍足日出行者求財不利見官失理此日不宜用之面熱法子主喜變事和合有財丑主有煩惱㐫憂之兆寅主有各人來相聚會卯主有酒食有外人至辰有逺人来聚會吉亨巳主有急事人来相見午主親姻相见會同坐未主口舌惹是非詞訟甲主有喜事臨時得財酉主有高人會道相間戍主有酒食不請自来亥主有喜事事訟不宣眼跳法子左有貢人右有酒食丑左有憂疑右有人思寅左逺人來右喜慶事卯左貴人來右平和吉辰左客人来右損害事已左有憂疑右㐫宻事午左主酒食右主㐫事未左主吉昌右主平善申左主得財右主女思酉左主客至石主親来戍左主酒食右主聚會亥左主貴客右主官事耳熱法子主有僧道来相探事丑主有喜事臨身大吉寅主有酒食相會大吉卯主有逺人求主見吉辰主有喜事大通達利已定主失財物大不利午主有喜信來至大利未主有客人来至求事甲主有酒食宴樂事吉酉主有女子至婚姻事戌主有争訟口舌之事亥主有詞訟口舌之事耳鳴法子左女人心右主失財丑左主口舌右主争訟寅左主失物右人心急卯左主坎坷右客寄至辰左右皆主逺行人来巳左主則㐫右主大吉午左右主逺信親人至未左右俱各逺行人至申左行人至右主大吉酉左主失財右主大吉戌左右各主酒食自来亥左主大吉右主酒食嚏噴法子主逢吉人酒食相會丑女人黙念客人求事寅主女人相通遇酒食卯主財喜有客來同事辰主終曰酒食大吉利巳主有喜人來求財吉午主有客旅酒食宴飮未主酒食相會喜天吉申主夢恐酒食不利酉主婦人来求請問事戌主婦人思有和合意亥主有虛不成有吉利肉顫法子主有貴人來至大吉丑主有喜慶臨身天吉寅主有訩事速滯之吉卯主有得財事大吉利辰主有㐫𢙣不吉之事巳主賔友相會大吉利午主有憂事占身則吉未主有喜事占身大吉申主口舌詞訟大不利酉定主失財灾禍事㐫戍主有行人逺来之吉亥主有大吉利喜慶事心驚法子主有女子思喜事至丑主有𢙣事不利則㐫寅主有客来飮食大吉卯主有酒食命外人来辰主辰合喜慶事大吉巳主婦人思多喜事至午王有酒食自来大吉未主有婦人思之吉利申主有喜事自来大吉酉主有喜信至大吉利戍主有官人即至大吉亥主有𢙣服夣恠火㐫鵲噪法子主有親人来至大吉丑主有喜慶之事大吉寅王有詞訟之事少吉卯主有酒食財喜天吉辰主有逺行人来家吉巳主有喜事亨通大吉午主有病疾求神安吉未主有六畜憂悶之事申主有喜慶事大吉昌酉主有坎坷不之事戍主有得錢財大吉利亥主有口舌争闘之事釜嗚法子定主六畜安大吉利丑主家宅大富貴吉利寅主家宅㐫恠事不利卯主家門禍事至大㐫辰主宜蚕好有大吉利已主喜禍臨身則大吉午主官事消散大吉利未主㐫禍事迍滯不利申主逺行人來昌盛吉酉主有行人来至大吉戍主有小富亨通大利亥主官事有理大吉昌火𨓜法子妻有外心煩惱憂悶丑外人至女外心口舌寅主財喜平安大吉利卯主得財帛亨通之利辰主憂心損男小口灾巳主有喜事酒食之利午主相争見官火灾事未主財人宅家道昌盛申主食財就合之事吉酉主有㐫事交豹之兆戌主憂心見官得理吉亥主身有疾病不成害犬嚎法子主有婦人不時争䦕丑主有憂恐憂心之事寅望天嚎財昌大吉利卯望天嚎必得財大吉辰主有喜事至大亨通巳主有親人思有信至午主逢酒食妄會大言未主妻子有外心破財申主家宅有小口即憂酉加官進禄必宅得財戍主有口舌之事不利亥定主有經官訟詞事衣留法子男主酒食女當親事丑生有遇憂破財之事寅親人有至憂惱不成卯主酒食交友同會吉辰自身破財憂惱疾病巳女人外心面無㐫事午主有速人至得財吉未主血光㐫禍事後吉申主得外財出入大吉酉主有客至破敗之事戌主詞訟得財大吉利亥主有見官得理吉利出行十二時子時東吉西酒食南吉北㐫丑時東自死西吉南㐫北得財寅時東得財西吉南吉北財卯時東萬倍西死南財北財辰時東吉西吉南財北㐫巳時東牢獄西吉南財北小䘮午時東病西㐫南病北財未時東㐫西㐫南財北財申時東得財西官事南吉北㐫酉時東口舌西萬倍南酒食北財戌時東得財西吉南病北酒食亥時東吉西吉南買賣北財神仙留下探病最凶日壬寅千午連庚午甲寅乙卯已卯方神仙留下此六日看人疾病代人亡碧玉經記出行日初一日不徃西行初八日不徃南行十五日不徃東行月晦日不徃北行得病㐫日春逢甲乙日夏逢丙丁日秋逢戊巳日冬逢庚辛日書曰得病若還逢此日便是黃泉路上人祜焦日正月辰日二月丑日三月戌日四月未日五月卯日六月子日七月酉日八月午日九月寅日十月亥日十一月申日十二月巳日書曰此日犯着是祜焦十人得病九人消娶嫁婦女無子嗣養蚕禮田並不收養牛養馬全無用上官赴任不到頭盖造動土犯焦日百日必定火焚燒紅沙日正月四月七月十月酉日二月五日八月十一月已日三月大月九月十二月丑日書曰出行卯紅沙决定不囬家起造動土卯百日火燒家得病犯紅沙必定犯絲麻嫁娶犯此日百日破其家黃沙日正月四月七月十月午日二月五月八月十一月寅日三月六月九月十二月子日畫曰出外犯此黄沙日三箇出外二箇死鬼哭日每月戍日是也鬼器之日世間邪十箇盧醫九不知說與盧醫休下樂連忙打墓又嫌遲二十八宿吉㐫日角木狡㐫鄧禹角星直日甚多殃祭祀安墳六不様嫁娶不然遭死簿更兼人在外郷亡開張起造並移徒一載之中見火光凡事所求皆不利興工墳穴切湏防亢金龍吉異漢亢星直日最爲良修造興工富貴昌七子廣招增禄位進寳招財千載中祭祀聖賢求所赴買賣移徒必擋揚惟忌造門宜嫁娶㣲灾消破也無防氐土络吉費復氐星直日盡皆通祭祀遷移利有功入宅求財並買費招財進寳利常豐專忌婚姻不可用魍魍欺凌在路逢却宜地十分利加官進禄在春人房日免吉耿甘房星直日鬼神欽動士經营必稱心造作埋大家旺婚姻投拜旺人丁上官出入皆吉利入宅從茲發萬春食禄門莹為苐一朝食日食有龍神心月狐吉寇恂心星直日喜長生祭祀婚姻世代榮富貴家門人口盛開張造起進珎珠修营移徒多倉稟聰俊児孫逹帝京凡事任行無不遂添田進宅播揚人尾火虎㐫岑彭尾星當權聞有驚𦵏埋必定主傷人修造起营多灾患嫁娶開張不稱情若還祭杞皆不利渾家大小受灾迍惟忌造門不可用立立力傷見火驚箕水豹㐫馮翼箕星直日最爲㐫祭祀嬌姻大不中移徒造門人命短遷移埋禍匆匆橫来官訟何曾歇口舌時逢重復重但看一年並五載前倉後庫一齋空斗木獬㐫朱郁斗星直日最為㐫開泰家門總不通凡事施爲皆不利休吉嫁娶及興工上官入宅多㐫禍祭祀安墳切莫逢若還不宜如此語家破人亡即滅中牛金牛㐫蔡遵牛星直日准多灾禍患時常展轉来運動遷移皆未遂迎賔命有主悲哀遭官失業全無吉起屋婚姻忌市開雲雨㣲微和目下千灾萬禍一齊來女土蝠㐫景丹女星直日准前㐫祭祀埋亦不中嫁娶主貧無主息遷移赴任主㐫同開張作事須切忌財寳倉厫一掃空不出一年三五載官事橫禍事重重虛日㐫盖延虛星直日不堪聞起造開埋定有迍若也祭祀神避非灾橫禍每臨門經营財帛皆空耗倉庫金銀化作塵移徒田蚕皆不遂婚姻無子早亡身危月鴈㐫堅譚危星直日事多端祭祀遷移財帛行動土興工招口舌會賔入宅結𡨚讎埋必主三人死一年两載見墳坵娶嫁一生無子息三年两載見踪由室灭猪吉耿純室星直日事皆通進寶招財在此中起屋婚姻多方慶埋安宅永從容三千食禄門門戸福德禎祥瑞氣濃拜職𠫭官俱有益仍歸交賀喜重重壁水㺄吉减官壁星直日不須憂祭祀婚姻芝太休起盖興工家大發榮華世代出公郷婚姻必定生貴子子子聰明四海逰買賣賀錢財也穩上官拜職占高侯奎木狼吉馬武奎星直曰妙深通祭祀婚姻財谷豐四粒掌中名上策納為宫職享公華埋必定家豪富遷移管取出三公動土興工并買賣起造開張及有功婁金狗吉劉隆婁星直日妙難言祭祀婚姻福壽全起造嫁娶並開市一枝丹桂應其年髙官出職加官禄件件流通喜十全倚獲田蚕多称意倉盈箱櫃益絲綿胃土雉吉馬誠胃星直日宜祭祀開張嫁娶甚亨通興工造宅添人口上任加官及有功𦵏埋公侯非不淺出行遂意利重重不然兩水兼水凍珠寳常盈倉庫中昂日雞小吉王良昴星直日不無㐫祭祀遷移造屋同買賣利同泉水樣婚姻赴任職加崇六招六畜添奴婢如用埋必有窮出入開張皆太吉若無天色也㣲風畢月鳥㐫陳俊畢星直日必無奇享祭開張两不宜娶婦三年多坎坷出八又遇是和非修营上任光頭破起屋亡身家必危閗亂血光難可免應時天色少人知火猴㐫傅俊星直日事遭迍祭祀遷移必有驚起屋不出二五載慕然暴病死三人婚姻必定無児女橫𢙣遭門罪不輕恐有𢙣風来應日紫衣禳謝後安鰥參水猿㐫杜茂參星直日主孤寒祭祀遷移事百端動土興工倶不羙終朝至暮淚連連失財六畜常時死驚恠非灾不等閑起屋開張如遇着大風魍魎外門闌井木犴㐫姚其并星直日是非多出入經商也不和最忌修門並祭祀開張起屋立消磨婚姻埋𦵏如逢此財散人亡沒柰何三年之中防失火大風應日主奔波鬼金芋吉王霸鬼星直日盡皆通天道温和瑞氣濃祭祀婚姻皆有益遷移起星永興隆𦵏埋必定人丁旺後庫前倉似石崇聦俊長人僧道貴爲官禄位占三公柳土獐吉任光柳屋直日最清廉祭祀婚姻福禄綿祭祀婚姻福禄綿起宅添官財禄益营謀十倍稱心田一天朗朗明堂現買賣開張吉降天車馬迎門招貴客星日馬吉李中星宿當權皎皎青出行厚利足經营婚姻起宅招財寶入宅安墳旺子孫不出三年家太富讀書筆陣掃千軍他年試看排官策箇箇爲官播今名張月吉萬庚張星直日應爲官起屋開張只一般祭祀遷移俱喜羙婚姻買賣两頭歡青天如熱期有應不福其年也有蚕子貴孫荣家頗甚方知由日不由天翼火蛇㐫祁仝翼星直日暖居中嫁娶𠫭官一一同不必埋𦵏俱有破只宜拜職禄增崇遷居祭祀生貴子動土興工禍患臨居門隠舊多安樂何勞事節又兼重軫水蚓吉劉直軫星直日多財寶祭祀遷移人口昌起宅修造增産業婚姻入宅不非常家生貴子光門戸歲歲之中保吉康大風大兩来應日豐身足食謝天倉六十花甲子喜神方甲子日喜神東北貴神西南五鬼正南死門西南乙丑日喜神西北貴神西南海中金五鬼正南死門正東丙寅日喜神西南貴神西南五鬼正南死門正東丁卯日喜神正南貴神西南爐中火五鬼正北死門正東戊辰日喜神東南貴神正南五鬼正南死門西南大林木巳巳日喜神東北貴神西南五鬼正東死門西南庚午日喜神西北貴神西南五鬼西南死門西北路傍土辛未日喜神西南貴神西北五鬼正東死門正北壬申日喜神正南貴神東南五鬼西南死門西南刀劒金癸酉日喜神東南貴神正北五鬼正南死門西北甲戌日喜神東北貴神西北五鬼正南死門東北山頭火乙亥日喜神西北貴神西北五鬼正南死門東南丙子日喜神西南貴神西北五鬼正北死門東南丁丑日喜神正南貴神西北澗下水五鬼正北死門正南戊寅日喜神東南貴神正北五鬼正南死門西北已卯日喜神東北貴神正南城頭土五鬼西北死門東北庚辰日喜神西北貴神正北五鬼正南死門西北白蠟金辛巳日喜神正南貴神西北五鬼正北死門西南壬午日喜神正南貴神正南五鬼西南死門西南楊柳木癸未日喜神東南貴神正東五鬼西南死門正北甲申日喜神東北貴神東北五鬼正東死門西南井泉水乙酉日喜神西北貴神西南五鬼正東死門東北丙戌日喜神西南貴神西北五鬼正北死門正南丁亥日喜神正南貴神東南屋上土五鬼西北死門正北戌子日喜神東南貴神東北五鬼西北死門正北已丑日喜神東北貴神西南霹靂火五鬼正南死門東北庚寅日喜神西北貴神正東五鬼正東死門正南松栢木辛卯日喜神西南貴神西北五鬼正北死門東南壬辰日喜神正南貴神正南人今為某事祈求聖籖伏望明彰報應指示愚迷所祈所願大賜願靈下情無任䖍禱之至舉籖念曰天地神祗萬物皆知吾今下課善惡扶持凶應凶兆吉應吉時判斷生死决定無疑玄天上帝聖降日正月初七日二月初八日三月初三日聖且初九日四月初四口五月初五日六月初七日七月初七日八月十三百九月初九日南宫五於聖白日飛昇十月二十一日十一月初七日十二月二十七日閏月相同玄天上帝感應靈籖第一籖大吉飛龍變化聖意飛龍變化喜逢時此日昇騰果遂期謀望求財多吉慶求官進位更無疑謀望冲霄志氣滿心胷君子應非乆困窮五鬼正北死門正東金箔金癸卯日喜神東南貴神東南五鬼正南死門正北甲辰日喜神東北貴神正北五鬼正東死門東北覆燈火乙已日喜神西北貴神正北五鬼正東死門東北丙午日喜伸西南貴神西北五鬼正北死門正南丁未日喜神正南貴神正南天河水五鬼正北死門西北戊申日喜神東南貴神正東五鬼西南死門東北己酉日喜神東北貴神正北大驛土五鬼正五死門東北庚戌日喜神西北貴神正南五鬼西南死門正南釧金辛亥日喜神西南貴神西北五鬼西南死門正東壬子日喜神正南貴神東北五鬼西北死門西南桑柘水牋丑日喜神東南貴神東南五鬼西南死門正南甲寅日喜神東北貴神正南五鬼正南死門西南六溪水乙卯曰喜神西北貴神正北五鬼正南死門正南丙辰日喜神西南貴神正西五鬼正南死門東北丁巳日喜神正南貴神正南沙中金五鬼西北死門正北戊午日喜神東南貴神正北五鬼西北死門西北已未日喜神東北貴神西北天上火五鬼正南死門正東庚申日喜神西北貴神西北五鬼正北死門東南石榴木辛酉日喜神西南貴神西北五鬼東北死門西北壬戌日喜神正南貴神東南五鬼西北死門西北大海水癸亥日喜神東南貴神東南五鬼正東死門正南諸神聖誕日玉匣記等集終
