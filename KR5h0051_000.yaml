front:
  text: 法師選擇記貞觀元年正月十五日唐太宗皇帝宣問諸大臣僚朕見天下萬姓母三四日長明設齋求福如何却有禍生當時三藏和尚奏萬姓設齋之日值遇凶神故為咎者皆是不按藏經內值言神可用之日所以致此臣今藏經內録如來選擇記奏上見其禍福由之日吉凶也甲子日是善財童子在世齋迷願者子孫昌盛福生招財大吉利乙丑丙寅日是阿羅漢尊長者與天神下降有人設齋還願者萬倍衣祿財寶自然吉慶大吉利丁卯日是司命檢齋有人祈禱還願者邁善為𢙣妨人口大凶可忌戊辰巳巳日是那吒太子檢齋若人設醮還福善為恩妨人口大凶庚午日是青衣童子在世檢齋還福者主萬倍富貴興大吉辛未日是三途餓鬼在世檢齋還願者主三年破財損六畜大訩壬申癸酉日是判宫在世檢齋還願者主一年內有禍大凶甲戌乙亥丙子丁丑戊寅巳卯六日是馬鳴王菩薩即得無量福曰萬事大吉利庚辰辛巳壬午日是淨神𢙣鬼在世設齋主傷人口生災家中常有血光火燭一年大凶癸未日是野婦羅剎設齋主一年內人口破散凶甲申乙酉丙戍三日是彌陀佛説法之日設齋還願主三年內獲福萬倍子孫興旺龍神獲佑百事吉丁亥日是朱雀神在世設齋還順者官災口舌病侵害大凶戊子日是𡨋司差極忌神在世設齋還願者主一年遇遭官事口舌是非疾病此曰大凶巳丑日是司命真君差童子在世檢齋還願者人口安康獲福無量此日平安庚寅辛卯日是畜神在世設齋還願者主一年內破財損畜是非大凶壬辰日是阿難尊者與青衣童子在世設齋還願者主子孫昌盛獲福無量三年大吉利癸巳日是惡神逰行設齋還願者主年年大不利甲午乙未丙申丁酉戊戌巳亥庚子辛丑八日是文殊普賢與青衣童子在世檢齋還願者此曰獲福無量百事大吉壬寅癸卯日是觀音菩薩行化之曰設齋還願者主見孫得獼後世生淨土所生男女十相俱𠯣大吉利也四辰乙巳日星天下四角大神在世檢齋還願者邁善為𢙣人眷生災大凶丙午丁未日是牛頭夜義在世檢齋還願者人不信用者三年內傷人口此日大凶戊申巳酉日是千佛下世設齋酬恩者主福利萬倍子孫昌盛財物典旺六畜孳生大吉利
